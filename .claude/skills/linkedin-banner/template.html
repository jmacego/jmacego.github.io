<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>LinkedIn Banner</title>
<style>
  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    width: 1584px;
    height: 396px;
    overflow: hidden;
    color: #F2F4F7;
    font-family: 'Plus Jakarta Sans', 'Helvetica Neue', system-ui, sans-serif;
    position: relative;
    /* Background image is set inline by render.py via the --bg-style hook */
    background: #0E0F10 var(--bg-image, none) center center / cover no-repeat;
  }

  /* Right-side gradient: keeps the photo clean on the left,
     ensures text contrast on the right without tinting the whole frame.
     Tuneable strength via --overlay-strength (defaults below). */
  .overlay {
    position: absolute; inset: 0;
    background: linear-gradient(90deg,
      transparent 0%,
      transparent 35%,
      rgba(14, 15, 16, calc(0.30 * var(--overlay-strength, 1))) 60%,
      rgba(14, 15, 16, calc(0.55 * var(--overlay-strength, 1))) 85%,
      rgba(14, 15, 16, calc(0.65 * var(--overlay-strength, 1))) 100%);
    pointer-events: none;
    z-index: 1;
  }

  /* Text block: anchored top-right, vertically positioned via --text-top.
     Defaults place it in the upper-third / middle band, right-aligned. */
  .text {
    position: absolute;
    top: var(--text-top, 90px);
    right: var(--right-padding, 56px);
    text-align: right;
    z-index: 2;
    max-width: var(--text-max-width, 820px);
  }

  .eyebrow {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #B7FF6A;
    margin: 0 0 14px 0;
  }

  .headline {
    font-family: 'Space Grotesk', 'Plus Jakarta Sans', system-ui, sans-serif;
    font-weight: 600;
    font-size: var(--headline-size, 44px);
    line-height: 1.06;
    letter-spacing: -0.025em;
    color: #F2F4F7;
    margin: 0 0 14px 0;
    /* Allow newlines in the data attribute to render as line breaks */
    white-space: pre-line;
  }

  .meta {
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.20em;
    text-transform: uppercase;
    color: #C7CDD6;
    margin: 0;
    white-space: pre-line;
  }
  .meta .dot { color: #98A2B3; margin: 0 8px; }

  /* Logo bottom-right, kept clear of profile-photo zone (which is bottom-left). */
  .logo {
    position: absolute;
    right: var(--right-padding, 56px);
    bottom: var(--bottom-padding, 30px);
    z-index: 2;
  }
  .logo img {
    height: var(--logo-height, 56px);
    width: auto;
    display: block;
  }
</style>
</head>
<body>
  <div class="overlay"></div>

  <div class="text">
    {{EYEBROW_BLOCK}}
    <h1 class="headline">{{HEADLINE}}</h1>
    {{META_BLOCK}}
  </div>

  <div class="logo">
    <img src="{{LOGO_SRC}}" alt="JMacLabs" />
  </div>
</body>
</html>
