<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>jmaclabs.com — UI Kit</title>
<link rel="stylesheet" href="../../colors_and_type.css" />
<style>
  html,body{margin:0;background:#fff;color:var(--text-primary-on-light);font-family:var(--font-sans);font-size:16px;line-height:1.5}
  .container{max-width:1100px;margin:0 auto;padding:0 24px}
  .site-header{padding:28px 0 16px;border-bottom:1px solid #e5e5e5;text-align:center}
  .site-logo{display:inline-block;line-height:0}
  .site-logo img{height:56px;width:auto;display:block}
  .site-nav{display:flex;flex-wrap:wrap;gap:.35rem;justify-content:center;align-items:center;padding:10px 0 16px}
  .site-nav-link{padding:.75rem 1rem;font-size:.875rem;color:var(--text-primary-on-light);text-decoration:none;letter-spacing:.02em}
  .site-nav-link:hover{color:var(--violet-500);text-decoration:none}
  .site-nav-link.active{color:var(--violet-500);font-weight:600}
  .blog-hero{padding:36px 0 16px;border-bottom:1px solid #f0f0f0;margin-bottom:24px}
  .blog-title{font-family:var(--font-blog-heading);font-size:3.5rem;font-weight:400;margin:0;color:var(--text-primary-on-light);letter-spacing:-.02em}
  .blog-description{color:#999;font-size:1.1rem;margin:0 0 .5rem}
  .blog-post{margin-bottom:3rem;max-width:760px}
  .blog-post-tag{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--violet-500);font-weight:600;margin-bottom:.25rem}
  .blog-post-title{font-family:var(--font-blog-heading);font-size:2.25rem;font-weight:600;margin:.25rem 0 .25rem;letter-spacing:-.01em;line-height:1.15}
  .blog-post-title a{color:var(--text-primary-on-light);text-decoration:none}
  .blog-post-title a:hover{color:var(--violet-500)}
  .blog-post-meta{color:#999;margin:0 0 1rem;font-size:14px}
  .blog-post-excerpt{color:#333;font-size:17px;line-height:1.6;margin:0 0 .75rem}
  .blog-post-more{color:var(--violet-500);text-decoration:none;font-weight:600;font-size:14px}
  .site-footer{padding:32px 0 48px;border-top:1px solid #f0f0f0;color:#777;text-align:center;font-size:14px}
  .site-footer a{color:var(--violet-500)}
  .cookie-notice{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);background:#fff;box-shadow:0 10px 30px rgba(0,0,0,.12);border:1px solid #eee;border-radius:12px;padding:10px 12px;display:flex;gap:8px;align-items:center;font-size:13px}
  .btn{font:600 12px/1 var(--font-sans);padding:7px 12px;border-radius:999px;border:1px solid transparent;cursor:pointer}
  .btn-primary{background:var(--violet-500);color:#fff}
  .btn-ghost{background:transparent;color:#333;border-color:#ddd}
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="./Components.jsx"></script>

  <script type="text/babel">
    const { useState } = React;
    function App() {
      const [showCookie, setShowCookie] = useState(true);
      const [current, setCurrent] = useState('Posts');
      return (
        <>
          <div className="container">
            <Header />
            <PrimaryNav current={current} />
            <main>
              <BlogHero />
              <BlogPost
                tag="AI Strategy"
                title="How to size an AI initiative so it actually ships"
                date="April 12, 2026"
                excerpt="A practical rubric for turning a board-level AI mandate into a scoped, measurable 90-day plan — written for Fractional CTO engagements."
              />
              <BlogPost
                tag="Architecture"
                title="The three diagrams every AI platform needs"
                date="March 28, 2026"
                excerpt="Data lineage, control plane, eval harness. If your team can't draw these on a whiteboard, your platform isn't real yet."
              />
              <SiteFooter />
            </main>
          </div>
          {showCookie && <CookieNotice onAccept={() => setShowCookie(false)} onDeny={() => setShowCookie(false)} />}
        </>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
