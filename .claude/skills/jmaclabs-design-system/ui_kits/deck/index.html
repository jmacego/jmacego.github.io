<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Deck UI Kit — JMacLabs</title>
<link rel="stylesheet" href="../../colors_and_type.css" />
<style>
  html,body{margin:0;background:var(--color-bg);color:var(--color-fg);font-family:var(--font-sans)}
  .deck-shell{max-width:1180px;margin:0 auto;padding:40px 28px;display:grid;gap:24px}
  h1.display{font-family:var(--font-serif-display);font-weight:600;font-size:clamp(2.2rem,4vw,3.6rem);line-height:1.02;letter-spacing:-.04em;margin:0 0 6px;max-width:18ch}
  h2.sec{font-family:var(--font-serif-display);font-weight:600;font-size:clamp(1.7rem,2.6vw,2.4rem);line-height:1.05;letter-spacing:-.04em;margin:0}
  p.lede{font-size:1.05rem;line-height:1.55;color:var(--color-fg-2);max-width:56ch;margin:0}
  .eyebrow{font:600 .78rem/1 var(--font-sans);letter-spacing:.18em;text-transform:uppercase;color:var(--lime-300);margin:0}
  .eyebrow.violet{color:var(--violet-300)}

  .grid-3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px}
  .grid-2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}

  .deck-card{border-radius:24px;padding:20px;border:1px solid var(--color-border);background:linear-gradient(180deg,#1C1F24c7,#0E0F10db);box-shadow:0 18px 42px -34px rgba(0,0,0,.8),inset 0 1px rgba(255,255,255,.04);display:flex;flex-direction:column;gap:10px;backdrop-filter:blur(16px)}
  .deck-card h3{font-family:var(--font-serif-display);font-weight:600;font-size:1.35rem;line-height:1.05;letter-spacing:-.03em;margin:0}
  .deck-card p.body{margin:0;font-size:.98rem;line-height:1.5;color:var(--color-fg-2)}
  .deck-card-glow-violet{background:radial-gradient(circle at top right,rgba(167,139,250,.18),transparent 35%),linear-gradient(160deg,#2A2F36e0,#15171Af5)}
  .deck-card-glow-lime{background:radial-gradient(circle at top right,rgba(154,242,60,.14),transparent 32%),linear-gradient(160deg,#2A2F36e0,#15171Af5)}

  .metric-tile{border-radius:18px;padding:16px 18px;border:1px solid var(--color-border);background:rgba(28,31,36,.74);backdrop-filter:blur(16px);display:grid;gap:2px}
  .metric-value{font-family:var(--font-serif-display);font-weight:700;font-size:1.4rem;color:var(--color-fg);letter-spacing:-.02em}
  .metric-label{color:var(--color-fg-muted);font-size:.9rem}

  .token-pill{display:inline-flex;align-items:center;min-height:2rem;border-radius:999px;padding:.35rem .8rem;font:600 .82rem/1 var(--font-sans);border:1px solid transparent;letter-spacing:.01em}
  .token-pill-lime{background:rgba(154,242,60,.14);color:var(--lime-300);border-color:rgba(154,242,60,.30)}
  .token-pill-violet{background:rgba(167,139,250,.14);color:var(--violet-300);border-color:rgba(167,139,250,.30)}
  .token-pill-neutral{background:rgba(58,64,74,.55);color:var(--color-fg-2);border-color:rgba(242,244,247,.12)}

  .deck-btn{font:600 14px/1 var(--font-sans);padding:12px 18px;border-radius:999px;border:1px solid transparent;cursor:pointer;transition:all var(--dur-med) var(--ease-out);white-space:nowrap}
  .deck-btn-md{padding:12px 20px}
  .deck-btn-sm{padding:8px 14px;font-size:12px}
  .deck-btn-primary{background:var(--lime-400);color:#0E0F10;border-color:var(--lime-500)}
  .deck-btn-primary:hover{background:var(--lime-300)}
  .deck-btn-secondary{background:rgba(167,139,250,.14);color:var(--violet-300);border-color:rgba(167,139,250,.3)}
  .deck-btn-ghost{background:transparent;color:var(--color-fg);border-color:var(--color-border-strong)}

  .hero{border-radius:28px;padding:28px;border:1px solid var(--color-hairline);background:radial-gradient(circle at top left,rgba(183,255,106,.10),transparent 35%),radial-gradient(circle at bottom right,rgba(167,139,250,.16),transparent 40%),linear-gradient(145deg,#1C1F24F7,#0E0F10FC);box-shadow:0 30px 60px -42px rgba(0,0,0,.55),0 40px 90px -60px rgba(139,92,246,.22);display:grid;grid-template-columns:minmax(0,1.05fr) minmax(280px,.95fr);gap:24px}
  .hero-actions{display:flex;gap:10px;margin-top:18px;flex-wrap:wrap}
  .hero-metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:22px}
  .hero-side{display:grid;place-items:center}
  .hero-logo{max-width:280px;width:100%;filter:drop-shadow(0 12px 30px rgba(0,0,0,.6))}
  @media(max-width:900px){.hero{grid-template-columns:1fr}.grid-3{grid-template-columns:1fr}.grid-2{grid-template-columns:1fr}}
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="./Components.jsx"></script>

  <script type="text/babel">
    function App() {
      return (
        <DeckShell>
          <section className="hero">
            <div>
              <Kicker>New deck system</Kicker>
              <h1 className="display" style={{marginTop:8}}>Dark neutrals, one clear signal at a time.</h1>
              <p className="lede" style={{marginTop:14}}>
                Built to stay quiet on projectors, crisp on laptops, and legible when the room lights drop.
              </p>
              <div className="hero-actions">
                <DeckButton>View the deck</DeckButton>
                <DeckButton variant="secondary">Download PDF</DeckButton>
                <DeckButton variant="ghost">Speaker notes</DeckButton>
              </div>
              <div className="hero-metrics">
                <MetricTile value="14" label="Tokens" />
                <MetricTile value="2" label="Accent families" />
                <MetricTile value="16:9" label="Slide framing" />
              </div>
            </div>
            <div className="hero-side">
              <img className="hero-logo" src="../../assets/logo-jmac-filled.png" alt="John MacDonald" />
            </div>
          </section>

          <section>
            <Kicker tone="violet">Component sampler</Kicker>
            <h2 className="sec" style={{marginTop:8}}>Cards, pills, metrics</h2>
            <div className="grid-3" style={{marginTop:16}}>
              <DeckCard eyebrow="Advisory" title="AI strategy reviews" body="Four weeks, one artifact: a scoped plan your board can actually act on." glow="violet" />
              <DeckCard eyebrow="Keynote" title="Speaking on stage" body="Talks on AI architecture for technical and executive audiences." glow="lime" />
              <DeckCard eyebrow="Patent" title="Applied AI, granted" body="A working system, not a slide." glow="violet">
                <div style={{display:'flex',gap:8,flexWrap:'wrap',marginTop:6}}>
                  <TokenPill>Lime / 400</TokenPill>
                  <TokenPill tone="violet">Violet / 400</TokenPill>
                  <TokenPill tone="neutral">Neutral / 850</TokenPill>
                </div>
              </DeckCard>
            </div>
          </section>
        </DeckShell>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
