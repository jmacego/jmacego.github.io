<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Title Slide — JMacLabs</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html,body{margin:0;background:#000;color:var(--color-fg);font-family:var(--font-sans);overflow:hidden}
  .stage{position:fixed;inset:0;display:grid;place-items:center}
  .slide{width:1920px;height:1080px;transform-origin:center center;background:radial-gradient(circle at 18% 22%,rgba(183,255,106,.08),transparent 38%),radial-gradient(circle at 82% 78%,rgba(167,139,250,.18),transparent 42%),linear-gradient(145deg,#1C1F24,#0E0F10);position:relative;padding:120px;display:flex;flex-direction:column;justify-content:center;gap:32px}
  .eyebrow{font:600 22px/1 var(--font-sans);letter-spacing:.22em;text-transform:uppercase;color:var(--lime-300);margin:0}
  h1{font-family:var(--font-serif-display);font-weight:600;font-size:168px;line-height:.94;letter-spacing:-.045em;margin:0;max-width:14ch;color:var(--color-fg)}
  .lede{font-size:32px;line-height:1.4;color:var(--color-fg-2);max-width:28ch;margin:0}
  .footer{position:absolute;left:120px;right:120px;bottom:60px;display:flex;justify-content:space-between;align-items:center}
  .who{display:flex;gap:18px;align-items:center}
  .who img{height:68px;width:auto}
  .name{font:600 20px/1.2 var(--font-sans);color:var(--color-fg)}
  .role{font:400 16px/1.2 var(--font-sans);color:var(--color-fg-muted);letter-spacing:.1em;text-transform:uppercase}
  .meta{font:600 18px/1 var(--font-mono);letter-spacing:.16em;text-transform:uppercase;color:var(--color-fg-muted)}
</style>
</head>
<body>
<div class="stage">
  <div class="slide" id="slide">
    <p class="eyebrow">Keynote · April 2026</p>
    <h1>Betting on AI without betting the company.</h1>
    <p class="lede">A Fractional CTO's playbook for scoping, sequencing, and shipping applied AI.</p>
    <div class="footer">
      <div class="who">
        <img src="../assets/logo-jmac-filled.png" alt="JMac" />
        <div>
          <div class="name">John MacDonald</div>
          <div class="role">Fractional CTO · JMacLabs</div>
        </div>
      </div>
      <div class="meta">jmaclabs.com</div>
    </div>
  </div>
</div>
<script>
  const s=document.getElementById('slide');function fit(){const w=innerWidth/1920,h=innerHeight/1080;s.style.transform=`scale(${Math.min(w,h)})`}fit();addEventListener('resize',fit);
</script>
</body>
</html>
