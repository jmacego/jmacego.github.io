<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Section Slide — JMacLabs</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html,body{margin:0;background:#000;overflow:hidden;font-family:var(--font-sans);color:var(--color-fg)}
  .stage{position:fixed;inset:0;display:grid;place-items:center}
  .slide{width:1920px;height:1080px;transform-origin:center center;background:radial-gradient(circle at 70% 30%,rgba(167,139,250,.22),transparent 40%),linear-gradient(145deg,#1C1F24,#0E0F10);padding:120px;display:flex;flex-direction:column;justify-content:center;position:relative}
  .num{font:700 42px/1 var(--font-mono);color:var(--violet-300);letter-spacing:.08em;margin-bottom:24px}
  h1{font-family:var(--font-serif-display);font-weight:600;font-size:220px;line-height:.92;letter-spacing:-.045em;margin:0;color:var(--color-fg);max-width:16ch}
  .rule{margin-top:40px;height:4px;width:120px;background:var(--lime-400);border-radius:999px}
  .kicker{font:700 22px/1 var(--font-sans);letter-spacing:.24em;text-transform:uppercase;color:var(--lime-300);margin-top:28px}
  .meta{position:absolute;left:120px;right:120px;bottom:60px;display:flex;justify-content:space-between;color:var(--color-fg-muted);font:600 16px/1 var(--font-mono);letter-spacing:.16em;text-transform:uppercase}
</style>
</head>
<body>
<div class="stage">
  <div class="slide" id="slide">
    <div class="num">02 / 06</div>
    <h1>The scoping<br/>problem.</h1>
    <div class="rule"></div>
    <div class="kicker">Section two</div>
    <div class="meta"><span>JMacLabs</span><span>AI Strategy · 2026</span></div>
  </div>
</div>
<script>const s=document.getElementById('slide');function fit(){const w=innerWidth/1920,h=innerHeight/1080;s.style.transform=`scale(${Math.min(w,h)})`}fit();addEventListener('resize',fit);</script>
</body>
</html>
