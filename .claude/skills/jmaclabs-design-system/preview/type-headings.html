<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>JMacLabs — Type: Headings + body</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html,body { margin:0; background:var(--color-bg); color:var(--color-fg); font-family:var(--font-sans); }
  .wrap { padding: 20px 24px; display:grid; gap: 12px; }
  .h2 { font-family: var(--font-serif-display); font-weight:600; font-size: 34px; line-height: 1.02; letter-spacing:-0.04em; margin:0; }
  .h3 { font-family: var(--font-serif-display); font-weight:600; font-size: 22px; line-height: 1.05; letter-spacing:-0.03em; margin:0; }
  .lede { font-family: var(--font-sans); font-size: 15px; line-height: 1.5; color: var(--color-fg-2); max-width: 60ch; margin:0; }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--color-fg-muted); }
</style>
</head>
<body>
<div class="wrap">
  <h2 class="h2">Swatches with deck-minded usage notes</h2>
  <h3 class="h3">Built to stay quiet on projectors</h3>
  <p class="lede">A dark-first swatch board for testing your new neutral, lime, and violet palette in actual presentation contexts.</p>
  <div class="meta">H2 34/1.02 · H3 22/1.05 · Lede IBM Plex Sans 15/1.5</div>
</div>
</body>
</html>
