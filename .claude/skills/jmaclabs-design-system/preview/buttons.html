<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>JMacLabs — Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html,body{margin:0;background:var(--color-bg);color:var(--color-fg);font-family:var(--font-sans)}
  .wrap{padding:22px;display:grid;gap:14px}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .btn{font:600 14px/1 var(--font-sans);padding:12px 18px;border-radius:999px;border:1px solid transparent;cursor:pointer;transition:all var(--dur-med) var(--ease-out)}
  .btn.primary{background:var(--lime-400);color:#0E0F10;border-color:var(--lime-500)}
  .btn.primary:hover{background:var(--lime-300)}
  .btn.secondary{background:rgba(167,139,250,.14);color:var(--violet-300);border-color:rgba(167,139,250,.3)}
  .btn.ghost{background:transparent;color:var(--color-fg);border-color:var(--color-border-strong)}
  .btn.ghost:hover{border-color:rgba(242,244,247,.32);background:rgba(242,244,247,.04)}
  .btn.sm{font-size:12px;padding:8px 14px}
  .btn.disabled{opacity:.4;pointer-events:none}
  .lbl{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--color-fg-muted);width:88px}
</style>
</head>
<body>
<div class="wrap">
  <div class="row"><div class="lbl">Primary</div><button class="btn primary">Book an engagement</button><button class="btn primary sm">Continue →</button><button class="btn primary disabled">Disabled</button></div>
  <div class="row"><div class="lbl">Secondary</div><button class="btn secondary">View the deck</button><button class="btn secondary sm">Read notes</button></div>
  <div class="row"><div class="lbl">Ghost</div><button class="btn ghost">Cancel</button><button class="btn ghost sm">Learn more</button></div>
</div>
</body>
</html>
