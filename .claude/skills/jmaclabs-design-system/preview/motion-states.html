<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>JMacLabs — Motion & states</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html,body{margin:0;background:var(--color-bg);color:var(--color-fg);font-family:var(--font-sans)}
  .wrap{padding:22px;display:grid;gap:14px}
  .row{display:grid;grid-template-columns:110px repeat(3,1fr);gap:10px;align-items:center}
  .lbl{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--color-fg-muted);font-weight:600}
  .btn{font:600 13px/1 var(--font-sans);padding:10px 16px;border-radius:999px;border:1px solid var(--lime-500);background:var(--lime-400);color:#0E0F10;text-align:center}
  .btn.hover{background:var(--lime-300)}
  .btn.press{background:var(--lime-500);transform:translateY(1px)}
  .state{font-family:var(--font-mono);font-size:11px;color:var(--color-fg-muted);text-align:center}
  .card-s{border:1px solid var(--color-border);border-radius:16px;background:var(--color-surface);padding:10px 14px;font-size:12px;color:var(--color-fg-2);text-align:center}
  .card-s.hover{border-color:rgba(242,244,247,.18);background:#2A2F36}
  .card-s.focus{border-color:var(--lime-400);box-shadow:0 0 0 3px rgba(154,242,60,.22)}
</style>
</head>
<body>
<div class="wrap">
  <div class="row"><div class="lbl">Button</div><div class="btn">Default</div><div class="btn hover">Hover (brighter)</div><div class="btn press">Press (1px down)</div></div>
  <div class="row"><div class="lbl"></div><div class="state">150ms · ease-out</div><div class="state">+brightness</div><div class="state">no scale, no bounce</div></div>
  <div class="row"><div class="lbl">Card</div><div class="card-s">Default</div><div class="card-s hover">Hover · border +white</div><div class="card-s focus">Focus · lime ring</div></div>
</div>
</body>
</html>
