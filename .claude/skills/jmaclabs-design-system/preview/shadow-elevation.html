<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>JMacLabs — Shadow / Elevation</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html,body{margin:0;background:var(--color-bg);color:var(--color-fg);font-family:var(--font-sans)}
  .wrap{padding:24px;display:grid;grid-template-columns:repeat(3,1fr);gap:18px;align-items:end}
  .card{background:linear-gradient(180deg,#1C1F24c7,#0E0F10db);border:1px solid var(--color-border);border-radius:20px;padding:14px 16px;min-height:84px;display:flex;flex-direction:column;justify-content:flex-end;gap:4px}
  .card.a{box-shadow:0 1px 2px rgba(0,0,0,.4)}
  .card.b{box-shadow:0 18px 42px -34px rgba(0,0,0,.8),inset 0 1px rgba(255,255,255,.04)}
  .card.c{box-shadow:0 30px 60px -42px rgba(0,0,0,.55),0 40px 90px -60px rgba(139,92,246,.22),inset 0 1px rgba(255,255,255,.04)}
  .n{font-size:13px;font-weight:600}
  .t{font-family:var(--font-mono);font-size:11px;color:var(--color-fg-muted)}
</style>
</head>
<body>
<div class="wrap">
  <div class="card a"><div class="n">Elevation 1</div><div class="t">shadow-sm · inline chrome</div></div>
  <div class="card b"><div class="n">Elevation 2</div><div class="t">shadow-md · standard card</div></div>
  <div class="card c"><div class="n">Elevation 3</div><div class="t">shadow-lg · hero + violet glow</div></div>
</div>
</body>
</html>
