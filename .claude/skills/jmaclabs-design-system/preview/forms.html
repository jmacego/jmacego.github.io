<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>JMacLabs — Form inputs</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html,body{margin:0;background:var(--color-bg);color:var(--color-fg);font-family:var(--font-sans)}
  .wrap{padding:22px;display:grid;gap:12px;max-width:520px}
  label{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--color-fg-muted);display:block;margin-bottom:6px}
  input,textarea,select{width:100%;background:rgba(14,15,16,.6);border:1px solid var(--color-border-strong);color:var(--color-fg);padding:12px 14px;border-radius:12px;font:400 14px/1.2 var(--font-sans);outline:none;transition:border-color var(--dur-med),box-shadow var(--dur-med)}
  input:focus,textarea:focus{border-color:rgba(154,242,60,.6);box-shadow:0 0 0 3px rgba(154,242,60,.18)}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
</style>
</head>
<body>
<div class="wrap">
  <div class="row">
    <div><label>Name</label><input value="John MacDonald" /></div>
    <div><label>Email</label><input value="john@jmaclabs.com" /></div>
  </div>
  <div><label>Engagement scope</label><textarea rows="2">AI strategy review, 4 weeks.</textarea></div>
</div>
</body>
</html>
