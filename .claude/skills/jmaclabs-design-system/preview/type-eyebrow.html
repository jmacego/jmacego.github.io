<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>JMacLabs — Type: Eyebrows & kickers</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html,body { margin:0; background:var(--color-bg); color:var(--color-fg); font-family:var(--font-sans); }
  .wrap { padding: 22px 26px; display:grid; gap: 16px; }
  .eyebrow { font-family: var(--font-sans); font-size: 12.5px; font-weight: 700; letter-spacing: .18em; text-transform: uppercase; color: var(--lime-300); }
  .kicker  { font-family: var(--font-sans); font-size: 13.5px; font-weight: 700; letter-spacing: .20em; text-transform: uppercase; color: var(--violet-300); }
  .meta    { font-family: var(--font-mono); font-size: 11.5px; letter-spacing: .10em; text-transform: uppercase; color: var(--color-fg-muted); }
  .row { display:flex; gap: 14px; align-items:baseline; }
  .row .tag { min-width: 94px; font-size: 10px; letter-spacing:.14em; text-transform:uppercase; color: var(--color-fg-muted); font-family: var(--font-mono); }
</style>
</head>
<body>
<div class="wrap">
  <div class="row"><div class="tag">Eyebrow</div><div class="eyebrow">Private Slide Study</div></div>
  <div class="row"><div class="tag">Kicker</div><div class="kicker">New Deck System</div></div>
  <div class="row"><div class="tag">Meta</div><div class="meta">Palette direction · April 2026</div></div>
</div>
</body>
</html>
