<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>JMacLabs — Type: Body (Plus Jakarta Sans)</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html,body { margin:0; background:var(--color-bg); color:var(--color-fg); font-family:var(--font-sans); }
  .wrap { padding: 20px 24px; display:grid; gap: 8px; }
  .meta { font-size: 11px; letter-spacing:.14em; text-transform:uppercase; color:var(--color-fg-muted); font-family: var(--font-mono); }
  .lede { font-size: 18px; line-height: 1.5; color: var(--color-fg-2); max-width: 58ch; font-weight: 400; }
  .body { font-size: 16px; line-height: 1.55; color: var(--color-fg); max-width: 60ch; font-weight: 500; }
  .small { font-size: 13px; color: var(--color-fg-muted); }
</style>
</head>
<body>
<div class="wrap">
  <div class="meta">Plus Jakarta Sans · Body</div>
  <div class="lede">Built to stay quiet on projectors, crisp on laptops, and legible when the room lights drop.</div>
  <div class="body">Fractional CTO and advisor focused on AI strategy, architecture, and technical leadership.</div>
  <div class="small">Regular 400 · Medium 500 · SemiBold 600 · Bold 700 · <i>Italics supported</i></div>
</div>
</body>
</html>
