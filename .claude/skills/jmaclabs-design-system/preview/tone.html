<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>JMacLabs — Content tone specimen</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html,body{margin:0;background:var(--color-bg);color:var(--color-fg);font-family:var(--font-sans)}
  .wrap{padding:20px 24px;display:grid;gap:10px;max-width:640px}
  .eye{font:600 11px/1 var(--font-sans);letter-spacing:.18em;text-transform:uppercase;color:var(--lime-300)}
  h2{font-family:var(--font-serif-display);font-weight:600;font-size:30px;line-height:1;letter-spacing:-.04em;margin:0;max-width:16ch}
  p{margin:0;font-size:14px;line-height:1.55;color:var(--color-fg-2)}
  .rule{font-size:11px;color:var(--color-fg-muted);font-family:var(--font-mono)}
</style>
</head>
<body>
<div class="wrap">
  <div class="eye">New Deck System</div>
  <h2>Dark neutrals with one clear signal color at a time.</h2>
  <p>Built to stay quiet on projectors, crisp on laptops, and legible when the room lights drop.</p>
  <div class="rule">Sentence case · cadenced in threes · no exclamation · no emoji · no hype</div>
</div>
</body>
</html>
