<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>JMacLabs — Type: Mono (Commit Mono)</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html,body { margin:0; background:var(--color-bg); color:var(--color-fg); font-family:var(--font-sans); }
  .wrap { padding: 20px 24px; display:grid; gap: 10px; }
  .meta { font-size: 11px; letter-spacing:.14em; text-transform:uppercase; color:var(--color-fg-muted); font-family: var(--font-mono); }
  pre { margin:0; font-family: var(--font-mono); font-size: 14px; line-height: 1.5; color: var(--color-fg); background: rgba(14,15,16,.5); border: 1px solid var(--color-border); border-radius: 12px; padding: 14px 16px; }
  .tok { color: var(--lime-300); }
  .key { color: var(--violet-300); }
  .num { color: var(--color-fg); }
  .cmt { color: var(--color-fg-muted); font-style: italic; }
</style>
</head>
<body>
<div class="wrap">
  <div class="meta">Commit Mono · Nerd Font · 400 / 700 · italics</div>
  <pre><span class="cmt">// tokens.css</span>
<span class="key">--lime-400</span>: <span class="tok">#9AF23C</span>;  <span class="cmt">/* signal */</span>
<span class="key">--violet-400</span>: <span class="tok">#A78BFA</span>;  <span class="cmt">/* structure */</span>
<span class="key">--r-xl</span>: <span class="num">24</span>px;</pre>
</div>
</body>
</html>
